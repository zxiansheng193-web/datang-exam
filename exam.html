<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大唐环宇名车岗位技能考试系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .timer {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.95);
            padding: 15px 25px;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
            z-index: 1000;
            border: 3px solid #667eea;
        }

        .timer.warning {
            color: #ff6b6b;
            border-color: #ff6b6b;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .selection-screen {
            padding: 40px;
        }

        .selection-title {
            text-align: center;
            font-size: 28px;
            color: #333;
            margin-bottom: 40px;
        }

        .role-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .role-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }

        .role-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .role-card h3 {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .role-card p {
            opacity: 0.9;
            font-size: 14px;
        }

        .exam-screen {
            padding: 30px;
            display: none;
        }

        .exam-info {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .exam-info-item {
            font-size: 16px;
            color: #555;
        }

        .exam-info-item strong {
            color: #333;
        }

        .questions-container {
            margin-bottom: 30px;
        }

        .question-item {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .question-type {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .question-type.choice {
            background: #e3f2fd;
            color: #1976d2;
        }

        .question-type.short {
            background: #fff3e0;
            color: #f57c00;
        }

        .question-type.scenario {
            background: #f3e5f5;
            color: #7b1fa2;
        }

        .question-title {
            font-size: 18px;
            color: #333;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .question-score {
            font-size: 14px;
            color: #666;
            margin-left: 10px;
        }

        .options-container {
            margin-left: 20px;
        }

        .option-item {
            margin-bottom: 10px;
            display: flex;
            align-items: center;
        }

        .option-item input[type="radio"] {
            margin-right: 10px;
            transform: scale(1.2);
            cursor: pointer;
        }

        .option-item label {
            cursor: pointer;
            font-size: 16px;
            color: #555;
        }

        .answer-textarea {
            width: 100%;
            min-height: 150px;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            font-family: inherit;
            resize: vertical;
            transition: border-color 0.3s;
        }

        .answer-textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
            justify-content: center;
        }

        .btn {
            padding: 15px 40px;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .result-screen {
            padding: 40px;
            display: none;
        }

        .result-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .result-title {
            font-size: 32px;
            color: #333;
            margin-bottom: 20px;
        }

        .score-display {
            font-size: 48px;
            font-weight: bold;
            color: #667eea;
        }

        .score-details {
            background: #f8f9fa;
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 30px;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 15px 0;
            border-bottom: 1px solid #ddd;
        }

        .detail-row:last-child {
            border-bottom: none;
        }

        .detail-label {
            font-size: 18px;
            color: #555;
        }

        .detail-value {
            font-size: 18px;
            font-weight: bold;
            color: #333;
        }

        .signatures-section {
            background: #fff;
            padding: 40px;
            border: 2px solid #ddd;
            border-radius: 8px;
            margin-top: 30px;
            page-break-inside: avoid;
        }

        .signatures-title {
            font-size: 20px;
            color: #333;
            margin-bottom: 30px;
            text-align: center;
        }

        .signature-row {
            display: flex;
            justify-content: space-between;
            gap: 40px;
            margin-bottom: 30px;
        }

        .signature-box {
            flex: 1;
            border: 2px solid #ddd;
            border-radius: 8px;
            padding: 20px;
            min-height: 150px;
        }

        .signature-label {
            font-size: 16px;
            color: #555;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .signature-line {
            border-bottom: 2px solid #333;
            height: 40px;
            margin-top: 30px;
        }

        .signature-date {
            margin-top: 10px;
            font-size: 14px;
            color: #666;
        }

        @media print {
            body {
                background: white;
                padding: 0;
            }

            .container {
                box-shadow: none;
            }

            .timer,
            .button-group {
                display: none !important;
            }

            .answer-textarea {
                border: 1px solid #ddd;
            }
        }

        @media (max-width: 768px) {
            .timer {
                font-size: 18px;
                padding: 10px 20px;
            }

            .role-cards {
                grid-template-columns: 1fr;
            }

            .signature-row {
                flex-direction: column;
                gap: 20px;
            }

            .header h1 {
                font-size: 24px;
            }

            .question-title {
                font-size: 16px;
            }

            .btn {
                padding: 12px 30px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="timer" id="timer">60:00</div>

    <div class="container">
        <div class="header">
            <h1>大唐环宇名车岗位技能考试系统</h1>
        </div>

        <!-- 岗位选择界面 -->
        <div class="selection-screen" id="selectionScreen">
            <h2 class="selection-title">请选择考试岗位</h2>
            <div class="role-cards">
                <div class="role-card" onclick="startExam('前台接待顾问')">
                    <h3>前台接待顾问</h3>
                    <p>客户接待 · 服务咨询 · 投诉处理</p>
                </div>
                <div class="role-card" onclick="startExam('机修工')">
                    <h3>机修工</h3>
                    <p>故障诊断 · 维修操作 · 质量检验</p>
                </div>
                <div class="role-card" onclick="startExam('库房管理员')">
                    <h3>库房管理员</h3>
                    <p>配件管理 · 库存控制 · 采购流程</p>
                </div>
            </div>
        </div>

        <!-- 考试界面 -->
        <div class="exam-screen" id="examScreen">
            <div class="exam-info">
                <div class="exam-info-item">
                    <strong>岗位：</strong><span id="examRole"></span>
                </div>
                <div class="exam-info-item">
                    <strong>考题数量：</strong><span id="questionCount"></span>
                </div>
                <div class="exam-info-item">
                    <strong>考试时间：</strong>60分钟
                </div>
            </div>

            <div class="questions-container" id="questionsContainer"></div>

            <div class="button-group">
                <button class="btn btn-secondary" onclick="goBack()">返回</button>
                <button class="btn btn-primary" onclick="submitExam()">提交试卷</button>
            </div>
        </div>

        <!-- 结果界面 -->
        <div class="result-screen" id="resultScreen">
            <div class="result-header">
                <h2 class="result-title">考试结果</h2>
                <div class="score-display">
                    总分：<span id="totalScore">0</span> 分
                </div>
            </div>

            <div class="score-details">
                <div class="detail-row">
                    <span class="detail-label">客观题得分</span>
                    <span class="detail-value" id="objectiveScore">0 分</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">简答题得分</span>
                    <span class="detail-value" id="shortAnswerScore">0 分</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">情景题得分</span>
                    <span class="detail-value" id="scenarioScore">0 分</span>
                </div>
            </div>

            <div class="signatures-section">
                <h3 class="signatures-title">签字确认</h3>
                <div class="signature-row">
                    <div class="signature-box">
                        <div class="signature-label">考试人员签字：</div>
                        <div class="signature-line"></div>
                        <div class="signature-date">日期：________年____月____日</div>
                    </div>
                    <div class="signature-box">
                        <div class="signature-label">审核人员签字：</div>
                        <div class="signature-line"></div>
                        <div class="signature-date">日期：________年____月____日</div>
                    </div>
                </div>
            </div>

            <div class="button-group">
                <button class="btn btn-secondary" onclick="printResult()">打印成绩单</button>
                <button class="btn btn-primary" onclick="restart()">重新考试</button>
            </div>
        </div>
    </div>

    <script>
        // 题库数据
        const questionBank = {
            '前台接待顾问': {
                choices: [
                    { question: '客户到店时，接待顾问应该首先做什么？', options: ['询问客户需求', '主动打招呼并微笑', '查看客户车辆状况', '引导客户停车'], answer: 1, score: 6 },
                    { question: '客户抱怨车辆维修时间太长，正确的处理方式是？', options: ['告诉客户这是正常的', '耐心解释并提供进度查询', '立即加快维修速度', '推脱责任'], answer: 1, score: 6 },
                    { question: '首次客户进店，最重要的服务原则是？', options: ['快速完成服务', '建立信任关系', '推销更多服务', '收集客户信息'], answer: 1, score: 6 },
                    { question: '客户要求试驾，正确的流程是？', options: ['直接把钥匙给客户', '查验驾照并签署试驾协议', '陪同客户一起试驾', '拒绝客户要求'], answer: 1, score: 6 },
                    { question: '处理客户投诉时，应该避免的行为是？', options: ['认真倾听', '表示理解', '立即承认错误', '争辩辩解'], answer: 3, score: 6 },
                ],
                shortAnswers: [
                    { question: '简述接待客户的标准流程', score: 15, answer: '标准流程：1.主动问候；2.引导停车；3.了解需求；4.协助登记；5.陪同检查；6.确认方案；7.安排工位；8.告知进度；9.交车检查；10.满意度调研' },
                    { question: '如何建立客户档案，包含哪些信息？', score: 15, answer: '客户档案应包含：1.基本信息（姓名、电话、地址）；2.车辆信息（车型、车架号、车牌）；3.维修历史；4.保养记录；5.服务偏好；6.投诉记录；7.保险信息' },
                    { question: '客户对报价有异议，如何处理？', score: 15, answer: '处理方法：1.耐心倾听客户疑虑；2.详细解释费用构成；3.提供明细清单；4.说明技术必要性；5.提供替代方案；6.争取客户理解；7.必要时申请折扣' },
                    { question: '如何提高客户满意度？', score: 15, answer: '提高方法：1.专业服务技能；2.及时沟通反馈；3.透明化服务流程；4.合理价格；5.便捷交车；6.跟进回访；7.处理投诉及时；8.定期关怀' },
                    { question: '描述一次成功的客户服务案例', score: 15, answer: '案例要素：1.客户需求识别；2.专业服务提供；3.问题解决过程；4.客户反馈收集；5.关系维护措施；6.服务改进建议' },
                ],
                scenarios: [
                    { question: '情景题：张先生来店里做保养，因等待时间过长而情绪激动。作为接待顾问，你应该如何处理？', score: 20, answer: '处理方案：1.先安抚客户情绪；2.诚恳道歉；3.立即查询进度；4.说明延误原因；5.提供解决方案（如加急处理）；6.适当补偿（如赠送服务）；7.全程跟进；8.事后致歉' },
                    { question: '情景题：李女士车辆维修后第二天又出现同样问题，要求退费。你应该如何处理？', score: 20, answer: '处理流程：1.详细了解问题；2.检查维修记录；3.与技术团队沟通；4.免费复查；5.如确属维修责任：5.1立即免费修复；5.2真诚道歉；5.3适当补偿；6.加强质量管控；7.后续跟进' },
                    { question: '情景题：一位VIP客户要求紧急维修，但工位已满。作为接待顾问，你应该如何安排？', score: 20, answer: '安排方案：1.向客户说明情况；2.表达重视；3.提供解决方案：3.1协调紧急工位；3.2安排加班维修；3.3协调其他门店；4.提供临时代步车；5.全程跟进进度；6.及时反馈；7.致歉感谢' },
                    { question: '情景题：客户要求维修非授权配件，你应该如何处理？', score: 20, answer: '处理原则：1.明确告知风险；2.说明授权配件优势；3.提供书面说明；4.尊重客户选择；5.使用配件登记；6.明确责任界定；7.提供售后保障说明' },
                    { question: '情景题：客户因交通事故需要紧急救援，应该如何应对？', score: 20, answer: '救援流程：1.安抚客户情绪；2.了解事故情况；3.判断是否需要报警；4.联系救援拖车；5.协助处理现场；6.安排接车；7.联系保险公司；8.准备维修方案；9.全程跟踪服务' },
                ]
            },
            '机修工': {
                choices: [
                    { question: '更换机油时，应该先做什么？', options: ['拆放油螺丝', '打开加注口盖', '启动发动机热车', '拆卸机油滤清器'], answer: 1, score: 6 },
                    { question: '发动机冷却液温度过高的常见原因是？', options: ['冷却液过多', '节温器故障', '风扇转速过快', '水温传感器损坏'], answer: 1, score: 6 },
                    { question: '更换刹车片时，最重要的安全措施是？', options: ['快速更换', '使用千斤顶支撑', '更换后磨合测试', '检查刹车液位'], answer: 3, score: 6 },
                    { question: '汽车空调不制冷，首先检查的是？', options: ['压缩机皮带', '制冷剂压力', '冷凝器清洁度', '蒸发器温度'], answer: 1, score: 6 },
                    { question: '四轮定位的目的是什么？', options: ['提高轮胎美观', '保证行驶稳定性和减少轮胎磨损', '增加车辆速度', '改善音响效果'], answer: 1, score: 6 },
                ],
                shortAnswers: [
                    { question: '简述发动机保养的常规项目', score: 15, answer: '常规项目：1.更换机油机滤；2.检查冷却液；3.检查刹车系统；4.检查轮胎气压；5.检查电瓶状态；6.更换空气滤清器；7.检查皮带张紧度；8.检查灯光' },
                    { question: '诊断发动机异响的步骤', score: 15, answer: '诊断步骤：1.听取异响特征；2.确定响声部位；3.分析可能原因；4.使用听诊器检查；5.测量相关参数；6.对比标准数据；7.确定故障点；8.制定维修方案' },
                    { question: '更换正时皮带的注意事项', score: 15, answer: '注意事项：1.记录正时标记；2.检查张紧轮；3.检查水泵；4.按规定扭矩紧固；5.调整皮带张紧度；6.检查正时点；7.手动转动检查；8.试车验证' },
                    { question: '如何判断轮胎是否需要更换？', score: 15, answer: '判断标准：1.胎纹深度低于1.6mm；2.胎面有明显裂纹；3.胎侧有鼓包或损伤；4.轮胎老化严重；5.修补次数过多；6.胎压不正常；7.行驶里程达到限制' },
                    { question: '描述一次复杂的故障诊断案例', score: 15, answer: '案例描述：1.故障现象描述；2.初步判断；3.诊断步骤；4.使用的工具设备；5.发现的故障点；6.维修方案；7.验证测试；8.预防措施' },
                ],
                scenarios: [
                    { question: '情景题：客户王师傅的车辆加速无力，伴有发动机抖动。作为维修技师，你应该如何诊断和维修？', score: 20, answer: '诊断流程：1.询问客户详细情况；2.使用诊断仪读取故障码；3.检查点火系统；4.检查燃油系统；5.检查进气系统；6.测量气缸压力；7.检查正时；8.综合分析确定故障点；9.针对性维修；10.路试验证' },
                    { question: '情景题：一辆自动挡车辆挂挡不走，应该如何排查？', score: 20, answer: '排查步骤：1.检查变速箱油液位和油质；2.检查变速箱油温传感器；3.检查换挡电磁阀；4.检查离合器摩擦片；5.检查油泵工作情况；6.检查传动轴；7.检查差速器；8.综合诊断确定故障' },

            },
            '库房管理员': {
                choices: [
                    { question: '配件入库时，最重要的检查项目是？', options: ['配件外观', '配件数量', '配件质量', '以上都是'], answer: 3, score: 6 },
                    { question: '盘点库存的最佳时间是？', options: ['业务繁忙时', '月底结账时', '业务较少时', '随时都可以'], answer: 2, score: 6 },
                    { question: '配件库存预警线通常设置为？', options: ['库存的10%', '库存的20%', '库存的30%', '库存的50%'], answer: 1, score: 6 },
                    { question: '配件出库时，应该遵循的原则是？', options: ['先进先出', '后进先出', '随意出库', '按客户要求'], answer: 0, score: 6 },
                    { question: '发现配件短缺时，首先应该做什么？', options: ['隐瞒不报', '立即上报', '自行补充', '找他人解决'], answer: 1, score: 6 },
                ],
                shortAnswers: [
                    { question: '简述配件入库的标准流程', score: 15, answer: '入库流程：1.核对采购订单；2.检查配件数量；3.检查配件质量；4.检查包装完整性；5.登记配件信息；6.分类入库存放；7.更新库存系统；8.打印入库单；9.相关签字确认' },
                    { question: '如何制定配件采购计划？', score: 15, answer: '制定步骤：1.分析历史销售数据；2.预测未来需求；3.检查库存状况；4.考虑季节性因素；5.评估供应商情况；6.确定采购数量和时间；7.审批采购计划；8.执行采购' },
                    { question: '配件库存管理的关键指标有哪些？', score: 15, answer: '关键指标：1.库存周转率；2.库存准确率；3.缺货率；4.呆滞库存占比；5.库存成本；6.采购及时率；7.质量合格率；8.订单满足率' },
                    { question: '如何处理呆滞库存配件？', score: 15, answer: '处理方法：1.分析呆滞原因；2.评估配件可用性；3.促销降价销售；4.调拨到其他门店；5.退回供应商；6.报废处理；7.建立预警机制；8.优化采购策略' },
                    { question: '描述一次成功的库存优化案例', score: 15, answer: '案例要素：1.问题识别；2.数据分析；3.改进方案；4.实施过程；5.效果评估；6.经验总结；7.推广价值；8.持续改进' },
                ],
                scenarios: [
                    { question: '情景题：月底盘点发现某配件账实不符，短缺10件。作为库房管理员，应该如何处理？', score: 20, answer: '处理流程：1.立即上报主管；2.详细盘点确认数量；3.查找出入库记录；4.检查相关单据；5.追溯责任人；6.分析短缺原因；7.完善管理制度；8.调整账目；9.加强培训' },
                    { question: '情景题：维修车间急需一个配件，但库存缺货。应该如何处理？', score: 20, answer: '处理流程：1.立即联系供应商；2.查询其他门店库存；3.协调调货或紧急采购；4.告知维修车间预计到货时间；5.安排专车取货；6.跟进物流进度；7.及时反馈；8.完善备货机制' },
                    { question: '情景题：供应商发来的配件质量有问题，应该如何处理？', score: 20, answer: '处理步骤：1.立即停止使用；2.记录问题配件信息；3.拍照留证；4.通知供应商；5.退回问题配件；6.要求补发合格产品；7.协商赔偿事宜；8.评估供应商资质；9.优化供应商管理' },
                    { question: '情景题：年底库存压力大，如何优化库存结构？', score: 20, answer: '优化方案：1.分析库存结构；2.识别呆滞配件；3.制定促销计划；4.加强采购控制；5.提高库存周转；6.优化备货策略；7.建立预警机制；8.定期评估效果' },
                    { question: '情景题：新来的库管员经常出错，应该如何帮助他？', score: 20, answer: '帮助措施：1.系统培训；2.制定操作手册；3.安排导师带教；4.规范操作流程；5.定期检查指导；6.建立奖惩机制；7.组织经验分享；8.持续跟踪改进' },
                ]
            }
        };

        // 全局变量
        let currentRole = '';
        let currentQuestions = [];
        let timerInterval = null;
        let remainingTime = 60 * 60; // 60分钟，单位秒

        // 开始考试
        function startExam(role) {
            currentRole = role;

            // 随机抽取题目
            const roleQuestions = questionBank[role];
            currentQuestions = [];

            // 抽取5道选择题（全部）
            currentQuestions.push(...roleQuestions.choices.map((q, i) => ({
                type: 'choice',
                ...q,
                index: i + 1
            })));

            // 随机抽取2道简答题
            const shuffledShort = [...roleQuestions.shortAnswers].sort(() => Math.random() - 0.5);
            currentQuestions.push(...shuffledShort.slice(0, 2).map((q, i) => ({
                type: 'short',
                ...q,
                index: roleQuestions.choices.length + i + 1
            })));

            // 随机抽取2道情景题
            const shuffledScenario = [...roleQuestions.scenarios].sort(() => Math.random() - 0.5);
            currentQuestions.push(...shuffledScenario.slice(0, 2).map((q, i) => ({
                type: 'scenario',
                ...q,
                index: roleQuestions.choices.length + 2 + i + 1
            })));

            // 显示考试界面
            document.getElementById('selectionScreen').style.display = 'none';
            document.getElementById('examScreen').style.display = 'block';

            // 更新考试信息
            document.getElementById('examRole').textContent = role;
            document.getElementById('questionCount').textContent = currentQuestions.length;

            // 渲染题目
            renderQuestions();

            // 开始倒计时
            startTimer();
        }

        // 渲染题目
        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';

            currentQuestions.forEach((q, index) => {
                const questionDiv = document.createElement('div');
                questionDiv.className = 'question-item';

                let typeLabel = '';
                if (q.type === 'choice') typeLabel = '选择题';
                else if (q.type === 'short') typeLabel = '简答题';
                else if (q.type === 'scenario') typeLabel = '情景题';

                let content = `
                    <span class="question-type ${q.type}">${typeLabel}</span>
                    <div class="question-title">
                        ${index + 1}. ${q.question}
                        <span class="question-score">（${q.score}分）</span>
                    </div>
                `;

                if (q.type === 'choice') {
                    content += '<div class="options-container">';
                    q.options.forEach((opt, optIndex) => {
                        content += `
                            <div class="option-item">
                                <input type="radio" name="question_${index}" value="${optIndex}" id="q${index}_opt${optIndex}">
                                <label for="q${index}_opt${optIndex}">${opt}</label>
                            </div>
                        `;
                    });
                    content += '</div>';
                } else {
                    content += `<textarea class="answer-textarea" name="question_${index}" placeholder="请在此处输入您的答案..."></textarea>`;
                }

                questionDiv.innerHTML = content;
                container.appendChild(questionDiv);
            });
        }

        // 开始倒计时
        function startTimer() {
            remainingTime = 60 * 60;
            updateTimerDisplay();

            timerInterval = setInterval(() => {
                remainingTime--;
                updateTimerDisplay();

                if (remainingTime <= 0) {
                    clearInterval(timerInterval);
                    alert('考试时间已到，系统将自动提交！');
                    submitExam();
                }
            }, 1000);
        }

        // 更新倒计时显示
        function updateTimerDisplay() {
            const minutes = Math.floor(remainingTime / 60);
            const seconds = remainingTime % 60;
            const timer = document.getElementById('timer');
            timer.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;

            // 最后5分钟警告
            if (remainingTime <= 300) {
                timer.classList.add('warning');
            } else {
                timer.classList.remove('warning');
            }
        }

        // 提交试卷
        function submitExam() {
            // 停止倒计时
            clearInterval(timerInterval);

            // 计算分数
            let objectiveScore = 0;
            let shortAnswerScore = 0;
            let scenarioScore = 0;

            currentQuestions.forEach((q, index) => {
                if (q.type === 'choice') {
                    const selected = document.querySelector(`input[name="question_${index}"]:checked`);
                    if (selected && parseInt(selected.value) === q.answer) {
                        objectiveScore += q.score;
                    }
                } else if (q.type === 'short') {
                    shortAnswerScore += q.score; // 简答题满分
                } else if (q.type === 'scenario') {
                    scenarioScore += q.score; // 情景题满分
                }
            });

            const totalScore = objectiveScore + shortAnswerScore + scenarioScore;

            // 显示结果
            document.getElementById('examScreen').style.display = 'none';
            document.getElementById('resultScreen').style.display = 'block';

            document.getElementById('totalScore').textContent = totalScore;
            document.getElementById('objectiveScore').textContent = objectiveScore + ' 分';
            document.getElementById('shortAnswerScore').textContent = shortAnswerScore + ' 分';
            document.getElementById('scenarioScore').textContent = scenarioScore + ' 分';
        }

        // 返回
        function goBack() {
            if (confirm('确定要返回吗？当前的答题进度将丢失。')) {
                clearInterval(timerInterval);
                document.getElementById('examScreen').style.display = 'none';
                document.getElementById('selectionScreen').style.display = 'block';
            }
        }

        // 打印成绩单
        function printResult() {
            window.print();
        }

        // 重新考试
        function restart() {
            document.getElementById('resultScreen').style.display = 'none';
            document.getElementById('selectionScreen').style.display = 'block';
            currentRole = '';
            currentQuestions = [];
            document.getElementById('timer').textContent = '60:00';
            document.getElementById('timer').classList.remove('warning');
        }
    </script>
</body>
