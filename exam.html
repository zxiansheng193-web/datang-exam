<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大唐环宇名车岗位技能考试系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .timer {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.95);
            padding: 15px 25px;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
            z-index: 1000;
            border: 3px solid #667eea;
        }

        .timer.warning {
            color: #ff6b6b;
            border-color: #ff6b6b;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .selection-screen {
            padding: 40px;
        }

        .selection-title {
            text-align: center;
            font-size: 28px;
            color: #333;
            margin-bottom: 40px;
        }

        .role-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .role-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }

        .role-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .role-card h3 {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .role-card p {
            opacity: 0.9;
            font-size: 14px;
        }

        .exam-screen {
            padding: 30px;
            display: none;
        }

        .exam-info {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .exam-info-item {
            font-size: 16px;
            color: #555;
        }

        .exam-info-item strong {
            color: #333;
        }

        .questions-container {
            margin-bottom: 30px;
        }

        .question-item {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .question-type {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .question-type.choice {
            background: #e3f2fd;
            color: #1976d2;
        }

        .question-type.short {
            background: #fff3e0;
            color: #f57c00;
        }

        .question-type.scenario {
            background: #f3e5f5;
            color: #7b1fa2;
        }

        .question-title {
            font-size: 18px;
            color: #333;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .question-score {
            font-size: 14px;
            color: #666;
            margin-left: 10px;
        }

        .options-container {
            margin-left: 20px;
        }

        .option-item {
            margin-bottom: 10px;
            display: flex;
            align-items: center;
        }

        .option-item input[type="radio"] {
            margin-right: 10px;
            transform: scale(1.2);
            cursor: pointer;
        }

        .option-item label {
            cursor: pointer;
            font-size: 16px;
            color: #555;
        }

        .answer-textarea {
            width: 100%;
            min-height: 150px;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            font-family: inherit;
            resize: vertical;
            transition: border-color 0.3s;
        }

        .answer-textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
            justify-content: center;
        }

        .btn {
            padding: 15px 40px;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .result-screen {
            padding: 40px;
            display: none;
        }

        .result-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .result-title {
            font-size: 32px;
            color: #333;
            margin-bottom: 20px;
        }

        .score-display {
            font-size: 48px;
            font-weight: bold;
            color: #667eea;
        }

        .score-details {
            background: #f8f9fa;
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 30px;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 15px 0;
            border-bottom: 1px solid #ddd;
        }

        .detail-row:last-child {
            border-bottom: none;
        }

        .detail-label {
            font-size: 18px;
            color: #555;
        }

        .detail-value {
            font-size: 18px;
            font-weight: bold;
            color: #333;
        }

        .signatures-section {
            background: #fff;
            padding: 40px;
            border: 2px solid #ddd;
            border-radius: 8px;
            margin-top: 30px;
            page-break-inside: avoid;
        }

        .signatures-title {
            font-size: 20px;
            color: #333;
            margin-bottom: 30px;
            text-align: center;
        }

        .signature-row {
            display: flex;
            justify-content: space-between;
            gap: 40px;
            margin-bottom: 30px;
        }

        .signature-box {
            flex: 1;
            border: 2px solid #ddd;
            border-radius: 8px;
            padding: 20px;
            min-height: 150px;
        }

        .signature-label {
            font-size: 16px;
            color: #555;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .signature-line {
            border-bottom: 2px solid #333;
            height: 40px;
            margin-top: 30px;
        }

        .signature-date {
            margin-top: 10px;
            font-size: 14px;
            color: #666;
        }

        @media print {
            body {
                background: white;
                padding: 0;
            }

            .container {
                box-shadow: none;
            }

            .timer,
            .button-group {
                display: none !important;
            }

            .answer-textarea {
                border: 1px solid #ddd;
            }
        }

        @media (max-width: 768px) {
            .timer {
                font-size: 18px;
                padding: 10px 20px;
            }

            .role-cards {
                grid-template-columns: 1fr;
            }

            .signature-row {
                flex-direction: column;
                gap: 20px;
            }

            .header h1 {
                font-size: 24px;
            }

            .question-title {
                font-size: 16px;
            }

            .btn {
                padding: 12px 30px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="timer" id="timer">60:00</div>

    <div class="container">
        <div class="header">
            <h1>大唐环宇名车岗位技能考试系统</h1>
        </div>

        <!-- 岗位选择界面 -->
        <div class="selection-screen" id="selectionScreen">
            <h2 class="selection-title">请选择考试岗位</h2>
            <div class="role-cards">
                <div class="role-card" onclick="startExam('前台接待顾问')">
                    <h3>前台接待顾问</h3>
                    <p>客户接待 · 服务咨询 · 投诉处理</p>
                </div>
                <div class="role-card" onclick="startExam('机修工')">
                    <h3>机修工</h3>
                    <p>故障诊断 · 维修操作 · 质量检验</p>
                </div>
                <div class="role-card" onclick="startExam('库房管理员')">
                    <h3>库房管理员</h3>
                    <p>配件管理 · 库存控制 · 采购流程</p>
                </div>
            </div>
        </div>

        <!-- 考试界面 -->
        <div class="exam-screen" id="examScreen">
            <div class="exam-info">
                <div class="exam-info-item">
                    <strong>岗位：</strong><span id="examRole"></span>
                </div>
                <div class="exam-info-item">
                    <strong>考题数量：</strong><span id="questionCount"></span>
                </div>
                <div class="exam-info-item">
                    <strong>考试时间：</strong>60分钟
                </div>
            </div>

            <div class="questions-container" id="questionsContainer"></div>

            <div class="button-group">
                <button class="btn btn-secondary" onclick="goBack()">返回</button>
                <button class="btn btn-primary" onclick="submitExam()">提交试卷</button>
            </div>
        </div>

        <!-- 结果界面 -->
        <div class="result-screen" id="resultScreen">
            <div class="result-header">
                <h2 class="result-title">考试结果</h2>
                <div class="score-display">
                    总分：<span id="totalScore">0</span> 分
                </div>
            </div>

            <div class="score-details">
                <div class="detail-row">
                    <span class="detail-label">客观题得分</span>
                    <span class="detail-value" id="objectiveScore">0 分</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">简答题得分</span>
                    <span class="detail-value" id="shortAnswerScore">0 分</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">情景题得分</span>
                    <span class="detail-value" id="scenarioScore">0 分</span>
                </div>
            </div>

            <div class="signatures-section">
                <h3 class="signatures-title">签字确认</h3>
                <div class="signature-row">
                    <div class="signature-box">
                        <div class="signature-label">考试人员签字：</div>
                        <div class="signature-line"></div>
                        <div class="signature-date">日期：________年____月____日</div>
                    </div>
                    <div class="signature-box">
                        <div class="signature-label">审核人员签字：</div>
                        <div class="signature-line"></div>
                        <div class="signature-date">日期：________年____月____日</div>
                    </div>
                </div>
            </div>

            <div class="button-group">
                <button class="btn btn-secondary" onclick="printResult()">打印成绩单</button>
                <button class="btn btn-primary" onclick="restart()">重新考试</button>
            </div>
        </div>
    </div>

    <script>
        // 题库数据
        const questionBank = {
            '前台接待顾问': {
                choices: [
                    { question: '客户到店时，接待顾问应该首先做什么？', options: ['询问客户需求', '主动打招呼并微笑', '查看客户车辆状况', '引导客户停车'], answer: 1, score: 2 },
                    { question: '客户抱怨车辆维修时间太长，正确的处理方式是？', options: ['告诉客户这是正常的', '耐心解释并提供进度查询', '立即加快维修速度', '推脱责任'], answer: 1, score: 2 },
                    { question: '首次客户进店，最重要的服务原则是？', options: ['快速完成服务', '建立信任关系', '推销更多服务', '收集客户信息'], answer: 1, score: 2 },
                    { question: '客户要求试驾，正确的流程是？', options: ['直接把钥匙给客户', '查验驾照并签署试驾协议', '陪同客户一起试驾', '拒绝客户要求'], answer: 1, score: 2 },
                    { question: '处理客户投诉时，应该避免的行为是？', options: ['认真倾听', '表示理解', '立即承认错误', '争辩辩解'], answer: 3, score: 2 },
                    { question: '客户咨询车辆保养周期时，应该？', options: ['随意回答', '查阅说明书或系统', '建议客户上网查询', '询问其他同事'], answer: 1, score: 2 },
                    { question: '接待客户时，应该保持什么态度？', options: ['冷淡专业', '热情友好', '忙碌不耐烦', '高高在上'], answer: 1, score: 2 },
                    { question: '客户对维修价格有异议时，首先应该？', options: ['立即降价', '解释价格构成', '拒绝沟通', '建议去别家'], answer: 1, score: 2 },
                    { question: '客户要求紧急维修，正确的做法是？', options: '优先安排，并告知预计时间', '直接拒绝', '按正常顺序等待', '让客户自己想办法']', options: ['优先安排，并告知预计时间', '直接拒绝', '按正常顺序等待', '让客户自己想办法'], answer: 0, score: 2 },
                    { question: '客户投诉维修后出现新问题，应该？', options: ['推卸责任', '立即检查并处理', '让客户再等等', '建议去4S店'], answer: 1, score: 2 },
                    { question: '客户要求保留旧配件，应该？', options: ['直接拒绝', '同意并妥善保管', '当作废品处理', '询问主管'], answer: 1, score: 2 },
                    { question: '客户咨询车辆保险时，应该？', options: ['不参与保险业务', '详细介绍公司保险服务', '推荐客户自己买', '让客户联系保险公司'], answer: 1, score: 2 },
                    { question: '客户忘记带证件，应该？', options: ['拒绝服务', '协助客户联系家人送来', '允许先服务后补证件', '让客户回去取'], answer: 1, score: 2 },
                    { question: '客户对服务态度不满意，应该？', options: ['解释自己工作忙', '诚恳道歉并改进', '忽略客户情绪', '建议客户投诉'], answer: 1, score: 2 },
                    { question: '客户要求见经理，应该？', options: ['拒绝', '立即通知经理', '拖延时间', '询问原因'], answer: 1, score: 2 },
                    { question: '客户问及竞争对手时，应该？', options: ['贬低对手', '客观对比', '不回答', '只说自己好'], answer: 1, score: 2 },
                    { question: '客户要求赠送服务时，应该？', options: ['直接拒绝', '根据情况酌情处理', '全部答应', '上报主管决定'], answer: 1, score: 2 },
                    { question: '客户投诉电话频繁时，应该？', options: ['不接电话', '耐心沟通并记录', '让客户去投诉', '告知客服'], answer: 1, score: 2 },
                    { question: '客户要求保留维修记录，应该？', options: ['拒绝', '提供完整记录', '只给部分记录', '让客户拍照'], answer: 1, score: 2 },
                    { question: '客户咨询二手车时，应该？', options: ['不参与', '介绍公司二手车服务', '推荐客户自己卖', '提供市场信息'], answer: 1, score: 2 },
                    { question: '客户要求加急维修时，首先应该？', options: ['立即开工', '查看工位和技师情况', '拒绝要求', '让客户加钱'], answer: 1, score: 2 },
                    { question: '客户对维修质量有疑问时，应该？', options: ['让客户放心', '详细说明维修过程和质量保证', '推给技术部门', '建议换店'], answer: 1, score: 2 },
                    { question: '客户要求更换配件但库存缺货，应该？', options: ['直接拒绝', '说明情况并预订', '推荐其他配件', '让客户等'], answer: 1, score: 2 },
                    { question: '客户咨询车辆改装时，应该？', options: ['积极推荐', '说明法规和风险', '完全拒绝', '让客户自己决定'], answer: 1, score: 2 },
                    { question: '客户投诉等待时间过长，应该？', options: ['解释这是正常的', '道歉并提供解决方案', '加快速度', '让客户改天来'], answer: 1, score: 2 },
                    { question: '客户要求开发票时，应该？', options: ['拒绝', '按要求开具', '让客户提供更多信息', '上报财务'], answer: 1, score: 2 },
                    { question: '客户对维修费用有疑问时，应该？', options: ['已经解释过了', '再次详细说明', '让客户自己算', '不理会'], answer: 1, score: 2 },
                    { question: '客户要求保留原厂配件时，应该？', options: ['拒绝', '同意并说明用途', '需要收费', '询问主管'], answer: 1, score: 2 },
                    { question: '客户咨询车辆年检时，应该？', options: ['不提供年检服务', '介绍公司年检服务', '让客户自己去', '只做维修'], answer: 1, score: 2 },
                    { question: '客户要求试驾时，必须？', options: ['直接同意', '查验驾照并签署协议', '陪同试驾', '以上都是'], answer: 3, score: 2 },
                    { question: '客户投诉服务态度差时，应该？', options: ['解释自己尽力了', '真诚道歉并改进', '不理会', '让客户投诉'], answer: 1, score: 2 },
                ],
                shortAnswers: [
                    { question: '简述接待客户的标准流程', score: 2, answer: '标准流程：1.主动问候；2.引导停车；3.了解需求；4.协助登记；5.陪同检查；6.确认方案；7.安排工位；8.告知进度；9.交车检查；10.满意度调研' },
                    { question: '如何建立客户档案，包含哪些信息？', score: 2, answer: '客户档案应包含：1.基本信息（姓名、电话、地址）；2.车辆信息（车型、车架号、车牌）；3.维修历史；4.保养记录；5.服务偏好；6.投诉记录；7.保险信息' },
                    { question: '客户对报价有异议，如何处理？', score: 2, answer: '处理方法：1.耐心倾听客户疑虑；2.详细解释费用构成；3.提供明细清单；4.说明技术必要性；5.提供替代方案；6.争取客户理解；7.必要时申请折扣' },
                    { question: '如何提高客户满意度？', score: 2, answer: '提高方法：1.专业服务技能；2.及时沟通反馈；3.透明化服务流程；4.合理价格；5.便捷交车；6.跟进回访；7.处理投诉及时；8.定期关怀' },
                    { question: '描述一次成功的客户服务案例', score: 2, answer: '案例要素：1.客户需求识别；2.专业服务提供；3.问题解决过程；4.客户反馈收集；5.关系维护措施；6.服务改进建议' },
                    { question: '如何处理客户投诉？', score: 2, answer: '处理步骤：1.耐心倾听；2.表示理解；3.道歉；4.调查原因；5.提供解决方案；6.跟进结果；7.总结改进' },
                    { question: '如何进行客户回访？', score: 2, answer: '回访要点：1.选择合适时间；2.询问服务满意度；3.了解是否有其他需求；4.记录反馈；5.跟进问题；6.维护关系' },
                    { question: '如何接待VIP客户？', score: 2, answer: '接待要点：1.提前准备；2.专属服务；3.优先安排；4.全程陪同；5.后续跟进；6.定期关怀' },
                    { question: '如何进行客户关怀？', score: 2, answer: '关怀方式：1.生日问候；2.节日祝福；3.保养提醒；4.优惠活动通知；5.天气预报提醒；6.车辆使用建议' },
                    { question: '如何建立客户信任？', score: 2, answer: '建立信任：1.专业服务；2.透明收费；3.按时交付；4.质量保证；5.诚实守信；6.及时沟通' },

                    { question: '情景题：发现某批配件长期滞销，占用大量资金，应该如何处理？', score: 2.5, answer: '处理方案：1.分析滞销原因；2.评估配件状态；3.制定促销方案；4.联系供应商退货；5.调拨到其他门店；6.报废处理；7.建立预警机制；8.优化采购策略' },
                    { question: '情景题：供应商突然涨价，但库存配件不足，应该如何应对？', score: 2.5, answer: '应对措施：1.分析涨价原因；2.评估涨价合理性；3.寻找替代供应商；4.谈判协商价格；5.调整采购策略；6.适当增加库存；7.优化库存结构；8.降低采购成本' },

        };

        // 全局变量
        let currentRole = '';
        let currentQuestions = [];
        let timerInterval = null;
        let remainingTime = 60 * 60; // 60分钟，单位秒

        // 开始考试
        function startExam(role) {
            currentRole = role;

            // 随机抽取题目
            const roleQuestions = questionBank[role];
            currentQuestions = [];

            // 抽取30道选择题
            if (roleQuestions.choices.length >= 30) {
                const shuffledChoices = [...roleQuestions.choices].sort(() => Math.random() - 0.5);
                currentQuestions.push(...shuffledChoices.slice(0, 30).map((q, i) => ({
                    type: 'choice',
                    ...q,
                    index: i + 1
                })));
            } else {
                // 如果选择题不足30道，全部抽取
                currentQuestions.push(...roleQuestions.choices.map((q, i) => ({
                    type: 'choice',
                    ...q,
                    index: i + 1
                })));
            }

            // 抽取10道简答题
            if (roleQuestions.shortAnswers.length >= 10) {
                const shuffledShort = [...roleQuestions.shortAnswers].sort(() => Math.random() - 0.5);
                currentQuestions.push(...shuffledShort.slice(0, 10).map((q, i) => ({
                    type: 'short',
                    ...q,
                    index: currentQuestions.length + 1
                })));
            } else {
                // 如果简答题不足10道，全部抽取
                currentQuestions.push(...roleQuestions.shortAnswers.map((q, i) => ({
                    type: 'short',
                    ...q,
                    index: currentQuestions.length + 1
                })));
            }

            // 抽取8道情景题
            if (roleQuestions.scenarios.length >= 8) {
                const shuffledScenario = [...roleQuestions.scenarios].sort(() => Math.random() - 0.5);
                currentQuestions.push(...shuffledScenario.slice(0, 8).map((q, i) => ({
                    type: 'scenario',
                    ...q,
                    index: currentQuestions.length + 1
                })));
            } else {
                // 如果情景题不足8道，全部抽取
                currentQuestions.push(...roleQuestions.scenarios.map((q, i) => ({
                    type: 'scenario',
                    ...q,
                    index: currentQuestions.length + 1
                })));
            }

            // 显示考试界面
            document.getElementById('selectionScreen').style.display = 'none';
            document.getElementById('examScreen').style.display = 'block';

            // 更新考试信息
            document.getElementById('examRole').textContent = role;
            document.getElementById('questionCount').textContent = currentQuestions.length;

            // 渲染题目
            renderQuestions();

            // 开始倒计时
            startTimer();
        }

        // 渲染题目
        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';

            currentQuestions.forEach((q, index) => {
                const questionDiv = document.createElement('div');
                questionDiv.className = 'question-item';

                let typeLabel = '';
                if (q.type === 'choice') typeLabel = '选择题';
                else if (q.type === 'short') typeLabel = '简答题';
                else if (q.type === 'scenario') typeLabel = '情景题';

                let content = `
                    <span class="question-type ${q.type}">${typeLabel}</span>
                    <div class="question-title">
                        ${index + 1}. ${q.question}
                        <span class="question-score">（${q.score}分）</span>
                    </div>
                `;

                if (q.type === 'choice') {
                    content += '<div class="options-container">';
                    q.options.forEach((opt, optIndex) => {
                        content += `
                            <div class="option-item">
                                <input type="radio" name="question_${index}" value="${optIndex}" id="q${index}_opt${optIndex}">
                                <label for="q${index}_opt${optIndex}">${opt}</label>
                            </div>
                        `;
                    });
                    content += '</div>';
                } else {
                    content += `<textarea class="answer-textarea" name="question_${index}" placeholder="请在此处输入您的答案..."></textarea>`;
                }

                questionDiv.innerHTML = content;
                container.appendChild(questionDiv);
            });
        }

        // 开始倒计时
        function startTimer() {
            remainingTime = 60 * 60;
            updateTimerDisplay();

            timerInterval = setInterval(() => {
                remainingTime--;
                updateTimerDisplay();

                if (remainingTime <= 0) {
                    clearInterval(timerInterval);
                    alert('考试时间已到，系统将自动提交！');
                    submitExam();
                }
            }, 1000);
        }

        // 更新倒计时显示
        function updateTimerDisplay() {
            const minutes = Math.floor(remainingTime / 60);
            const seconds = remainingTime % 60;
            const timer = document.getElementById('timer');
            timer.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;

            // 最后5分钟警告
            if (remainingTime <= 300) {
                timer.classList.add('warning');
            } else {
                timer.classList.remove('warning');
            }
        }

        // 提交试卷
        function submitExam() {
            // 停止倒计时
            clearInterval(timerInterval);

            // 计算分数
            let objectiveScore = 0;
            let shortAnswerScore = 0;
            let scenarioScore = 0;

            currentQuestions.forEach((q, index) => {
                if (q.type === 'choice') {
                    const selected = document.querySelector(`input[name="question_${index}"]:checked`);
                    if (selected && parseInt(selected.value) === q.answer) {
                        objectiveScore += q.score;
                    }
                } else if (q.type === 'short') {
                    shortAnswerScore += q.score; // 简答题满分
                } else if (q.type === 'scenario') {
                    scenarioScore += q.score; // 情景题满分
                }
            });

            const totalScore = objectiveScore + shortAnswerScore + scenarioScore;

            // 显示结果
            document.getElementById('examScreen').style.display = 'none';
            document.getElementById('resultScreen').style.display = 'block';

            document.getElementById('totalScore').textContent = totalScore;
            document.getElementById('objectiveScore').textContent = objectiveScore + ' 分';
            document.getElementById('shortAnswerScore').textContent = shortAnswerScore + ' 分';
            document.getElementById('scenarioScore').textContent = scenarioScore + ' 分';
        }

        // 返回
        function goBack() {
            if (confirm('确定要返回吗？当前的答题进度将丢失。')) {
                clearInterval(timerInterval);
                document.getElementById('examScreen').style.display = 'none';
                document.getElementById('selectionScreen').style.display = 'block';
            }
        }

        // 打印成绩单
        function printResult() {
            window.print();
        }

        // 重新考试
        function restart() {
            document.getElementById('resultScreen').style.display = 'none';
            document.getElementById('selectionScreen').style.display = 'block';
            currentRole = '';
            currentQuestions = [];
            document.getElementById('timer').textContent = '60:00';
            document.getElementById('timer').classList.remove('warning');
        }
    </script>
